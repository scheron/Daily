name: Release Daily App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release on macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.5.0"

      - name: Install pnpm
        run: npm install -g pnpm@10.12.1

      - name: Install dependencies
        run: pnpm install

      - name: Build app
        run: pnpm run build

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Generate release notes from CHANGELOG.md
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "Using version: $VERSION"
          node scripts/release-notes.js "$VERSION"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            dist/*.dmg

      - name: Trigger Homebrew tap update
        shell: bash
        env:
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TAP_REPO_TOKEN}" \
            https://api.github.com/repos/scheron/homebrew-tap/dispatches \
            -d "{\"event_type\":\"update-cask\",\"client_payload\":{\"version\":\"${VERSION}\"}}"
